# frontend/nginx.conf
# Served by the nginx:alpine container built in frontend/Dockerfile.
#
# Two responsibilities:
#   1. Serve the Vite-built React SPA with proper fallback for client-side routing
#   2. Reverse-proxy all /api/* requests to the backend container so the
#      browser never needs to know the backend's address

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml
                    application/json application/javascript
                    application/rss+xml application/atom+xml
                    image/svg+xml;

    # ── Cache static assets aggressively ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    # Forwards /api/... → http://backend:8000/api/...
    # "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeouts for the initial Jira sync response
        proxy_connect_timeout  60s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    # Any path that is not a real file is served as index.html so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
