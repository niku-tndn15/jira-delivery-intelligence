version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Jira Analytics Platform — Docker Compose
#
# Usage:
#   cp .env.example .env   # fill in your credentials
#   docker-compose up --build
#
# Services:
#   postgres   – persistent PostgreSQL 16 database
#   backend    – FastAPI app; waits for postgres, applies schema,
#                runs initial Jira sync, then starts uvicorn
#   frontend   – Vite/React app built with Node, served by Nginx;
#                Nginx also proxies /api → backend so there is no
#                CORS issue and no hardcoded backend URL in the browser
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       jira_analytics
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Expose port only to the host for optional local psql access.
    # Remove this block if you do not need direct DB access.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jira_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── 2. FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .                   # project root — gives access to scripts/ and db/
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy  # only starts after pg_isready passes
    environment:
      # Override localhost → postgres (the Docker service name)
      DATABASE_URL:      postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/jira_analytics

      # Jira credentials — all sourced from your .env file
      JIRA_BASE_URL:     ${JIRA_BASE_URL}
      JIRA_EMAIL:        ${JIRA_EMAIL}
      JIRA_API_TOKEN:    ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY:  ${JIRA_PROJECT_KEY}

      # Optional custom field overrides
      JIRA_STORY_POINTS_FIELD: ${JIRA_STORY_POINTS_FIELD:-story_points}
      JIRA_AC_FIELD:           ${JIRA_AC_FIELD:-customfield_10016}

      # API behaviour
      CORS_ORIGINS: '["http://localhost", "http://localhost:80", "http://localhost:3000"]'
    ports:
      - "8000:8000"
    # The frontend container proxies /api internally, so this port is
    # mainly useful for hitting the Swagger UI directly during development.

  # ── 3. React / Nginx frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"        # dashboard available at http://localhost
    # No environment variables needed — the Nginx config proxies /api
    # to the backend service at build-time via upstream block.


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
